# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: check-fmt
        name: check-fmt
        entry: uv run ruff format --check
        language: system
        types: [ python ]
        require_serial: true
      - id: check-lint
        name: check-lint
        entry: uv run ruff check
        language: system
        types: [ python ]
        require_serial: true
